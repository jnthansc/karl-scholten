name: Deploy production (Netlify)

on:
  workflow_dispatch:

jobs:
  trigger-netlify-build:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify production build
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          if [ -z "$NETLIFY_BUILD_HOOK" ]; then
            echo "::error::NETLIFY_BUILD_HOOK secret is not set or is empty."
            exit 1
          fi
          curl -fsS -X POST -d '' "$NETLIFY_BUILD_HOOK"
